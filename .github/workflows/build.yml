name: Build and publish custom Caddy image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
  schedule:
    - cron: "25 3 * * *"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/server-stack-caddy" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push 2.11-crowdsec
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CADDY_VERSION=2.11
          tags: |
            ${{ env.IMAGE_NAME }}:2.11-crowdsec
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
